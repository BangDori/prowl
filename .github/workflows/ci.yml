name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check src changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - "src/**"

  ci:
    needs: check
    if: needs.check.outputs.src == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Check file headers
        run: |
          missing=()
          for file in $(git diff --name-only --diff-filter=d origin/${{ github.base_ref }} -- 'src/**/*.ts' 'src/**/*.tsx'); do
            first_line=$(head -n 1 "$file")
            if [[ ! "$first_line" =~ ^/\*\* ]]; then
              missing+=("$file")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing JSDoc file header in:"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  e2e:
    needs: check
    if: needs.check.outputs.src == 'true'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: E2E Test
        run: bun run e2e:test

  ci-status:
    needs: [check, ci, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [ "${{ needs.ci.result }}" = "failure" ]; then exit 1; fi
          if [ "${{ needs.e2e.result }}" = "failure" ]; then exit 1; fi
          echo "CI passed or skipped"
