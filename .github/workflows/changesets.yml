name: Changesets

on:
  push:
    branches: [develop]

jobs:
  changesets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Get next version from changesets
        id: get-version
        run: |
          bunx changeset status --output=.changeset-status.json 2>/dev/null || true
          if [ -f .changeset-status.json ]; then
            VERSION=$(node -p "const s = require('./.changeset-status.json'); s.releases?.find(r => r.name === 'prowl')?.newVersion ?? s.releases?.[0]?.newVersion ?? ''")
            rm -f .changeset-status.json
            if [ -n "$VERSION" ]; then
              echo "pr_title=chore: release v$VERSION" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "pr_title=chore: version packages" >> $GITHUB_OUTPUT

      - name: Create or update Version Packages PR
        uses: changesets/action@v1
        with:
          title: ${{ steps.get-version.outputs.pr_title }}
          commit: "chore: version packages"
          version: bun run version-packages
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Trim PR body to latest version only
        run: |
          PR_NUMBER=$(gh pr list --head "changeset-release/develop" --state open --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No release PR found, skipping"
            exit 0
          fi
          gh pr view "$PR_NUMBER" --json body --jq '.body' | \
            awk '/^## \[[0-9]/{count++; if(count==2)exit} {print}' > /tmp/pr-body.md
          gh pr edit "$PR_NUMBER" --body-file /tmp/pr-body.md
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
