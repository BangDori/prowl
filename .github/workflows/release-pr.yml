name: Release PR to main

on:
  pull_request:
    types: [closed]
    branches: [develop]
  workflow_dispatch:

jobs:
  create-release-pr:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'changeset-release/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Resolve PR title
        id: title
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(node -p "require('./package.json').version")
            echo "value=release v$VERSION" >> $GITHUB_OUTPUT
          else
            TITLE=$(echo "${{ github.event.pull_request.title }}" | sed 's/^chore: //')
            echo "value=$TITLE" >> $GITHUB_OUTPUT
          fi

      - name: Write PR body to file
        run: |
          echo "## Commits" > /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          git log origin/main..origin/develop --pretty=format:"- %s" >> /tmp/pr-body.md

      - name: Create PR develop → main
        run: |
          EXISTING=$(gh pr list --base main --head develop --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR already exists: #$EXISTING, skipping"
            exit 0
          fi

          gh pr create \
            --base main \
            --head develop \
            --title "$PR_TITLE" \
            --body-file /tmp/pr-body.md
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_TITLE: ${{ steps.title.outputs.value }}
