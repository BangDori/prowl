name: Version Check

on:
  pull_request:
    branches: [main]

jobs:
  version-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        run: |
          CHANGED=$(git diff origin/main...HEAD --name-only)

          if ! echo "$CHANGED" | grep -q "^package.json$"; then
            echo "::error::package.json 버전이 변경되지 않았습니다. /version-bump 스킬을 실행하세요."
            exit 1
          fi

          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")

          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "::error::package.json 버전이 변경되지 않았습니다. (현재: $CURRENT)"
            exit 1
          fi

          echo "✅ 버전 변경 확인: $PREVIOUS → $CURRENT"

      - name: Check changelog update
        run: |
          CHANGED=$(git diff origin/main...HEAD --name-only)

          if ! echo "$CHANGED" | grep -q "^CHANGELOG.md$"; then
            echo "::error::CHANGELOG.md가 업데이트되지 않았습니다. /version-bump 스킬을 실행하세요."
            exit 1
          fi

          VERSION=$(node -p "require('./package.json').version")

          if ! grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md에 v${VERSION} 섹션이 없습니다."
            exit 1
          fi

          echo "✅ CHANGELOG.md 업데이트 확인: v${VERSION} 섹션 존재"
